- step:
    name: preprocess
    image: python:3.9
    environment: azure-westeurope-f2sv2
    command:
      - pip install evidently==0.4.16 pandas==2.2.1 scikit-learn==1.4.1.post1
      - python preprocess.py
#    parameters:
#      - name: dataset_path
#        optional: true
#    inputs:
#      - name: dataset
#        default: _{parameter:dataset_path}
#        optional: true

- step:
    name: train_model
    image: python:3.9
    environment: azure-westeurope-f2sv2
    command:
      - pip install evidently==0.4.16 pandas==2.2.1 scikit-learn==1.4.1.post1
      - python train_model.py
    inputs:
      - name: dataset
        default: datum://california_housing_dataset

- step:
    name: inference_and_report
    image: python:3.9
    environment: azure-westeurope-f2sv2
    command:
      - pip install evidently==0.4.16 pandas==2.2.1 scikit-learn==1.4.1.post1
      - pip install valohai-utils
      - python report.py
    inputs:
      - name: ref_dataset
        default: datum://california_housing_dataset
      - name: cur_dataset
        default: https://valohai-demo-library-data.s3.eu-west-1.amazonaws.com/drift-detection/evidently_current_data_with_drift.csv
      - name: model
        default: datum://california_housing_model


- pipeline:
    name: train-inference-pipeline
    parameters:
      - name: dataset
        targets:
          - preprocess-node.parameter.dataset_path
    nodes:
      - name: preprocess-node
        type: execution
        step: preprocess
      - name: train-model-node
        type: execution
        step: train_model
    edges:
      - [preprocess-node.output.*.csv, train-model-node.input.dataset]

